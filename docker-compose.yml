services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhooks
      POSTGRES_USER: webhooks
      POSTGRES_PASSWORD: webhooks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhooks -d webhooks"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: webhooks
      POSTGRES_USER: webhooks
      POSTGRES_PASSWORD: webhooks
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: python manage.py run_delivery_worker
    environment:
      DJANGO_DEBUG: "true"
      POSTGRES_DB: webhooks
      POSTGRES_USER: webhooks
      POSTGRES_PASSWORD: webhooks
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy

  mock-receiver:
    build: .
    command: uvicorn mock_receiver.app:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"

volumes:
  postgres_data:
